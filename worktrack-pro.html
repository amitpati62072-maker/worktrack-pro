<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#2563EB">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WorkTrack Pro">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>WorkTrack Pro | Worker Attendance Management System</title>
<style>
/* ===================== ROOT / THEME ===================== */
:root{
  --primary:#2563EB;
  --primary-dark:#1d4ed8;
  --primary-light:#3b82f6;
  --primary-tint:#eef3ff;
  --bg:#f3f6fc;
  --bg-grad:linear-gradient(160deg,#eef3ff 0%,#f7f9fd 40%,#eef2fb 100%);
  --card-bg:rgba(255,255,255,0.72);
  --card-bg-solid:#ffffff;
  --card-border:rgba(37,99,235,0.10);
  --text:#0f172a;
  --text-muted:#64748b;
  --text-faint:#94a3b8;
  --green:#16a34a;
  --green-tint:#e8fbef;
  --red:#dc2626;
  --red-tint:#fdecec;
  --amber:#d97706;
  --amber-tint:#fff4e0;
  --purple:#7c3aed;
  --purple-tint:#f2ecff;
  --shadow-sm:0 2px 10px rgba(30,58,138,0.06);
  --shadow-md:0 10px 30px rgba(30,58,138,0.10);
  --shadow-lg:0 20px 50px rgba(30,58,138,0.16);
  --radius-lg:20px;
  --radius-md:16px;
  --radius-sm:12px;
  --header-h:64px;
}
html.dark{
  --bg:#0b1120;
  --bg-grad:linear-gradient(160deg,#0b1120 0%,#0d1428 50%,#0a0f1e 100%);
  --card-bg:rgba(24,31,51,0.62);
  --card-bg-solid:#151c30;
  --card-border:rgba(255,255,255,0.07);
  --text:#eef2f9;
  --text-muted:#a3adc2;
  --text-faint:#6b7690;
  --green-tint:rgba(22,163,74,0.14);
  --red-tint:rgba(220,38,38,0.14);
  --amber-tint:rgba(217,119,6,0.16);
  --purple-tint:rgba(124,58,237,0.16);
  --shadow-sm:0 2px 10px rgba(0,0,0,0.25);
  --shadow-md:0 10px 30px rgba(0,0,0,0.35);
  --shadow-lg:0 20px 50px rgba(0,0,0,0.5);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,'Noto Sans Devanagari',Arial,sans-serif;
  background:var(--bg-grad);
  color:var(--text);
  min-height:100vh;
  transition:background .35s ease,color .35s ease;
  padding-bottom:40px;
}
h1,h2,h3,h4{margin:0; letter-spacing:-.01em;}
p{margin:0;}
button{font-family:inherit;}
::selection{background:var(--primary-light); color:#fff;}
.app{max-width:520px; margin:0 auto; position:relative; min-height:100vh;}

/* ===================== SCROLLBAR ===================== */
::-webkit-scrollbar{width:6px; height:6px;}
::-webkit-scrollbar-thumb{background:rgba(37,99,235,.3); border-radius:10px;}

/* ===================== HEADER ===================== */
.topbar{
  position:sticky; top:0; z-index:40;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px;
  background:linear-gradient(135deg,var(--primary) 0%, var(--primary-dark) 100%);
  color:#fff;
  box-shadow:0 6px 24px rgba(37,99,235,0.28);
  border-radius:0 0 22px 22px;
}
.brand{display:flex; align-items:center; gap:10px;}
.brand-icon{
  width:40px; height:40px; border-radius:12px;
  background:rgba(255,255,255,0.18);
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,0.25);
}
.brand-icon svg{width:22px; height:22px;}
.brand-text h1{font-size:17px; font-weight:800; line-height:1.1;}
.brand-text span{font-size:10.5px; opacity:.88; font-weight:500; display:block; margin-top:2px;}
.header-right{display:flex; align-items:center; gap:10px;}
.header-date{font-size:11px; text-align:right; opacity:.92; line-height:1.3; font-weight:500;}
.header-date b{display:block; font-size:12.5px; font-weight:700;}
.menu-btn{
  width:36px; height:36px; border-radius:10px; border:none;
  background:rgba(255,255,255,0.16); color:#fff;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  transition:background .2s;
}
.menu-btn:active{background:rgba(255,255,255,0.32); transform:scale(.94);}
.menu-btn svg{width:19px;height:19px;}

/* dropdown menu */
.dropdown{
  position:fixed; top:70px; right:14px; z-index:60;
  background:var(--card-bg-solid);
  border:1px solid var(--card-border);
  border-radius:16px;
  box-shadow:var(--shadow-lg);
  min-width:200px;
  overflow:hidden;
  opacity:0; transform:translateY(-8px) scale(.97);
  pointer-events:none;
  transition:all .18s ease;
}
.dropdown.open{opacity:1; transform:translateY(0) scale(1); pointer-events:auto;}
.dropdown button{
  width:100%; text-align:left; padding:13px 16px; background:none; border:none;
  display:flex; align-items:center; gap:11px; font-size:14px; font-weight:600;
  color:var(--text); cursor:pointer; border-bottom:1px solid var(--card-border);
}
.dropdown button:last-child{border-bottom:none;}
.dropdown button:active{background:var(--primary-tint);}
.dropdown svg{width:17px;height:17px; color:var(--primary); flex-shrink:0;}
.overlay-dim{position:fixed; inset:0; background:rgba(15,23,42,0.25); z-index:55; opacity:0; pointer-events:none; transition:opacity .2s;}
.overlay-dim.open{opacity:1; pointer-events:auto;}

/* ===================== MAIN CONTAINER ===================== */
.content{padding:16px 14px 10px;}
.view{display:none; animation:fadeUp .35s ease;}
.view.active{display:block;}
@keyframes fadeUp{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}

/* ===================== GLASS CARD ===================== */
.glass{
  background:var(--card-bg);
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  border:1px solid var(--card-border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-sm);
}

/* ===================== DASHBOARD ===================== */
.dash-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
.dash-card{
  padding:14px; border-radius:var(--radius-md);
  display:flex; flex-direction:column; gap:6px;
  position:relative; overflow:hidden;
}
.dash-card .dc-icon{
  width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center;
}
.dash-card .dc-icon svg{width:17px; height:17px;}
.dash-card .dc-val{font-size:22px; font-weight:800;}
.dash-card .dc-label{font-size:11.5px; color:var(--text-muted); font-weight:600;}
.dc-blue .dc-icon{background:var(--primary-tint); color:var(--primary);}
.dc-green .dc-icon{background:var(--green-tint); color:var(--green);}
.dc-red .dc-icon{background:var(--red-tint); color:var(--red);}
.dc-amber .dc-icon{background:var(--amber-tint); color:var(--amber);}

/* ===================== ACTION BUTTONS ===================== */
.action-row{display:flex; gap:10px; margin-bottom:16px;}
.btn{
  border:none; cursor:pointer; font-weight:700; border-radius:14px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:transform .12s ease, box-shadow .2s ease, opacity .2s;
  -webkit-user-select:none; user-select:none;
}
.btn:active{transform:scale(.96);}
.btn svg{width:17px;height:17px;}
.btn-primary{
  flex:1.3; padding:14px; font-size:14.5px; color:#fff;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  box-shadow:0 10px 22px rgba(37,99,235,0.30);
}
.btn-outline{
  flex:1; padding:14px; font-size:14px; color:var(--primary);
  background:var(--card-bg); border:1.5px solid var(--primary);
}
.btn-block{width:100%;}
.btn-lg{padding:15px; font-size:15px;}
.btn-secondary{background:var(--card-bg); color:var(--text); border:1.5px solid var(--card-border);}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626); color:#fff;}
.btn-sm{padding:9px 12px; font-size:12.5px; border-radius:10px;}

/* ===================== SEARCH ===================== */
.search-wrap{position:relative; margin-bottom:14px;}
.search-wrap svg{position:absolute; left:14px; top:50%; transform:translateY(-50%); width:17px; height:17px; color:var(--text-faint);}
.search-input{
  width:100%; padding:13px 14px 13px 40px; border-radius:14px;
  border:1px solid var(--card-border); background:var(--card-bg);
  color:var(--text); font-size:14px; backdrop-filter:blur(10px);
  outline:none;
}
.search-input:focus{border-color:var(--primary);}
.search-input::placeholder{color:var(--text-faint);}

.section-title{font-size:13px; font-weight:800; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; margin:18px 4px 10px;}

/* ===================== DATE PICKER CARD ===================== */
.date-picker-card{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:13px 14px; border-radius:var(--radius-md); margin-bottom:14px;
}
.date-picker-card.past-mode{
  border:1.5px solid var(--amber);
  background:var(--amber-tint);
}
.dp-left{display:flex; align-items:center; gap:10px; color:var(--primary);}
.date-picker-card.past-mode .dp-left{color:var(--amber);}
.dp-label{font-size:10.5px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.03em;}
.dp-date{font-size:14px; font-weight:800; color:var(--text); margin-top:1px;}
#attendDateInput{
  padding:9px 10px; border-radius:11px; border:1px solid var(--card-border);
  background:var(--card-bg); color:var(--text); font-size:12.5px; max-width:150px;
}

/* ===================== WORKER CARD ===================== */
.worker-card{
  padding:14px; border-radius:var(--radius-md); margin-bottom:12px;
  display:flex; flex-direction:column; gap:12px;
  transition:box-shadow .25s ease, transform .25s ease;
}
.worker-top{display:flex; align-items:center; gap:12px;}
.worker-serial{
  font-size:11px; font-weight:800; color:var(--primary); background:var(--primary-tint);
  width:24px; height:24px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.worker-avatar{
  width:46px; height:46px; border-radius:13px; object-fit:cover; flex-shrink:0;
  background:linear-gradient(135deg,var(--primary-light),var(--primary-dark));
  display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:16px;
}
.worker-info{flex:1; min-width:0;}
.worker-name{font-size:15px; font-weight:750; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.worker-meta{font-size:11.5px; color:var(--text-muted); margin-top:2px; display:flex; gap:6px; flex-wrap:wrap; align-items:center;}
.tag{background:var(--primary-tint); color:var(--primary); padding:2px 7px; border-radius:6px; font-weight:700; font-size:10.5px;}
.worker-status-badge{font-size:10px; font-weight:800; padding:3px 9px; border-radius:20px; white-space:nowrap;}
.badge-present{background:var(--green-tint); color:var(--green);}
.badge-absent{background:var(--red-tint); color:var(--red);}
.badge-half{background:var(--amber-tint); color:var(--amber);}
.badge-leave{background:var(--purple-tint); color:var(--purple);}
.badge-none{background:var(--card-bg); color:var(--text-faint); border:1px dashed var(--card-border);}

.attend-row{display:flex; gap:8px;}
.att-btn{
  flex:1; padding:12px 6px; border-radius:12px; border:1.5px solid transparent;
  font-weight:800; font-size:13px; display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; transition:all .15s ease; background:var(--card-bg);
}
.att-btn svg{width:18px;height:18px;}
.att-present{color:var(--green); border-color:rgba(22,163,74,0.25);}
.att-present.active{background:linear-gradient(135deg,#22c55e,#16a34a); color:#fff; box-shadow:0 8px 18px rgba(22,163,74,0.35);}
.att-absent{color:var(--red); border-color:rgba(220,38,38,0.25);}
.att-absent.active{background:linear-gradient(135deg,#f87171,#dc2626); color:#fff; box-shadow:0 8px 18px rgba(220,38,38,0.35);}
.att-btn:active{transform:scale(.93);}
.mini-row{display:flex; gap:8px; justify-content:space-between;}
.mini-link{
  flex:1; text-align:center; font-size:11px; font-weight:700; padding:7px; border-radius:9px;
  color:var(--text-muted); background:transparent; border:1px dashed var(--card-border); cursor:pointer;
}
.mini-link.on-half{color:var(--amber); border-color:var(--amber); background:var(--amber-tint);}
.mini-link.on-leave{color:var(--purple); border-color:var(--purple); background:var(--purple-tint);}
.worker-actions{display:flex; gap:8px;}
.icon-btn{
  width:34px; height:34px; border-radius:10px; border:1px solid var(--card-border); background:var(--card-bg);
  display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-muted);
}
.icon-btn svg{width:15px;height:15px;}
.icon-btn:active{transform:scale(.9);}

.pulse-anim{animation:pulseGood .5s ease;}
@keyframes pulseGood{0%{box-shadow:0 0 0 0 rgba(22,163,74,.5);} 70%{box-shadow:0 0 0 14px rgba(22,163,74,0);} 100%{box-shadow:0 0 0 0 rgba(22,163,74,0);}}
.pulse-bad{animation:pulseBad .5s ease;}
@keyframes pulseBad{0%{box-shadow:0 0 0 0 rgba(220,38,38,.5);} 70%{box-shadow:0 0 0 14px rgba(220,38,38,0);} 100%{box-shadow:0 0 0 0 rgba(220,38,38,0);}}

.empty-state{text-align:center; padding:50px 20px; color:var(--text-muted);}
.empty-state svg{width:56px; height:56px; color:var(--text-faint); margin-bottom:12px;}
.empty-state h3{font-size:15px; margin-bottom:4px; color:var(--text);}
.empty-state p{font-size:12.5px;}

/* ===================== FORM ===================== */
.page-title{display:flex; align-items:center; gap:10px; margin-bottom:18px;}
.back-btn{
  width:38px; height:38px; border-radius:11px; border:1px solid var(--card-border);
  background:var(--card-bg); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text);
}
.back-btn svg{width:18px;height:18px;}
.page-title h2{font-size:18px; font-weight:800;}
.page-title p{font-size:11.5px; color:var(--text-muted); margin-top:2px;}

.form-card{padding:18px; border-radius:var(--radius-lg);}
.field{margin-bottom:16px;}
.field label{display:block; font-size:12.5px; font-weight:700; color:var(--text-muted); margin-bottom:7px;}
.field input,.field select{
  width:100%; padding:13px 14px; border-radius:13px; border:1.5px solid var(--card-border);
  background:var(--bg); color:var(--text); font-size:14.5px; outline:none; transition:border-color .15s;
}
html.dark .field input, html.dark .field select{background:rgba(255,255,255,0.04);}
.field input:focus, .field select:focus{border-color:var(--primary);}
.field-hint{font-size:11px; color:var(--text-faint); margin-top:5px;}
.photo-upload{
  display:flex; align-items:center; gap:14px; padding:14px; border:1.5px dashed var(--card-border);
  border-radius:14px; cursor:pointer; background:var(--bg);
}
.photo-preview{
  width:56px; height:56px; border-radius:14px; object-fit:cover; background:var(--primary-tint);
  display:flex; align-items:center; justify-content:center; color:var(--primary); flex-shrink:0;
}
.photo-preview svg{width:24px;height:24px;}
.photo-upload span{font-size:13px; font-weight:600; color:var(--text-muted);}
.form-actions{display:flex; gap:10px; margin-top:6px;}
.autoid-box{
  padding:12px 14px; border-radius:13px; background:var(--primary-tint); color:var(--primary);
  font-weight:800; font-size:14px; letter-spacing:.03em; display:flex; align-items:center; justify-content:space-between;
}

/* ===================== HISTORY ===================== */
.filter-row{display:flex; gap:10px; margin-bottom:14px;}
.filter-row input[type=month]{
  flex:1; padding:11px 12px; border-radius:13px; border:1px solid var(--card-border);
  background:var(--card-bg); color:var(--text); font-size:13px;
}
.hist-card{padding:15px; border-radius:var(--radius-md); margin-bottom:12px;}
.hist-head{display:flex; align-items:center; gap:12px; margin-bottom:12px;}
.hist-stats{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:8px;}
.hstat{text-align:center; padding:9px 4px; border-radius:11px;}
.hstat b{display:block; font-size:16px; font-weight:800;}
.hstat span{font-size:9.5px; font-weight:700; color:var(--text-muted); text-transform:uppercase;}
.hstat.hp{background:var(--green-tint); color:var(--green);}
.hstat.ha{background:var(--red-tint); color:var(--red);}
.hstat.hh{background:var(--amber-tint); color:var(--amber);}
.hstat.hl{background:var(--purple-tint); color:var(--purple);}
details.datewise{margin-top:6px;}
details.datewise summary{
  cursor:pointer; font-size:12.5px; font-weight:700; color:var(--primary); padding:8px 0; list-style:none; display:flex; align-items:center; gap:6px;
}
details.datewise summary::-webkit-details-marker{display:none;}
.datewise-list{max-height:220px; overflow-y:auto; padding-top:6px;}
.dw-row{display:flex; justify-content:space-between; align-items:center; padding:8px 10px; border-radius:9px; font-size:12.5px; margin-bottom:5px; background:var(--bg);}
html.dark .dw-row{background:rgba(255,255,255,0.03);}

/* ===================== SALARY ===================== */
.salary-card{padding:15px; border-radius:var(--radius-md); margin-bottom:12px;}
.sal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.sal-name{font-weight:750; font-size:14.5px;}
.sal-wage{font-size:11.5px; color:var(--text-muted);}
.sal-total{font-size:17px; font-weight:800; color:var(--primary);}
.sal-breakdown{display:flex; gap:6px; flex-wrap:wrap;}
.sal-chip{font-size:10.5px; font-weight:700; padding:4px 9px; border-radius:20px;}
.grand-total{
  padding:18px; border-radius:var(--radius-lg); margin-top:6px; margin-bottom:16px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff;
  display:flex; justify-content:space-between; align-items:center; box-shadow:var(--shadow-md);
}
.grand-total h3{font-size:12.5px; opacity:.85; font-weight:600;}
.grand-total .gt-val{font-size:24px; font-weight:800; margin-top:2px;}
.export-row{display:flex; gap:10px; margin-bottom:16px;}

/* ===================== SETTINGS ===================== */
.settings-list{padding:6px; border-radius:var(--radius-lg);}
.set-item{
  display:flex; align-items:center; justify-content:space-between; gap:10px; padding:15px 12px;
  border-bottom:1px solid var(--card-border);
}
.set-item:last-child{border-bottom:none;}
.set-left{display:flex; align-items:center; gap:12px;}
.set-icon{width:38px; height:38px; border-radius:11px; background:var(--primary-tint); color:var(--primary); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.set-icon svg{width:18px;height:18px;}
.set-text b{font-size:13.8px; font-weight:700; display:block;}
.set-text span{font-size:11px; color:var(--text-muted);}
.set-icon.danger{background:var(--red-tint); color:var(--red);}
.set-icon.purple{background:var(--purple-tint); color:var(--purple);}

.switch{position:relative; width:46px; height:26px; flex-shrink:0;}
.switch input{opacity:0; width:0; height:0;}
.slider{position:absolute; cursor:pointer; inset:0; background:#cbd5e1; border-radius:30px; transition:.25s;}
.slider:before{content:""; position:absolute; height:20px; width:20px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.25s; box-shadow:0 2px 5px rgba(0,0,0,.2);}
input:checked + .slider{background:var(--primary);}
input:checked + .slider:before{transform:translateX(20px);}

/* ===================== MODAL ===================== */
.modal-overlay{
  position:fixed; inset:0; background:rgba(15,23,42,0.45); backdrop-filter:blur(3px);
  display:flex; align-items:flex-end; justify-content:center; z-index:100;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.modal-overlay.open{opacity:1; pointer-events:auto;}
.modal-box{
  background:var(--card-bg-solid); width:100%; max-width:480px; border-radius:24px 24px 0 0;
  padding:24px 20px 26px; transform:translateY(100%); transition:transform .3s cubic-bezier(.22,1,.36,1);
  box-shadow:0 -10px 40px rgba(0,0,0,0.2);
}
.modal-overlay.open .modal-box{transform:translateY(0);}
.modal-icon{
  width:52px; height:52px; border-radius:16px; background:var(--red-tint); color:var(
